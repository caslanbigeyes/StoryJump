services:
  # ---- 数据库 ----
  postgres:
    image: postgres:15
    container_name: storyjump-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: storyjump
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 缓存 & 队列 ----
  redis:
    image: redis:7-alpine
    container_name: storyjump-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 后端 API 服务 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storyjump-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3010
      DATABASE_URL: postgresql://postgres:password@postgres:5432/storyjump?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
    ports:
      - '3010:3010'
    volumes:
      - media_data:/app/public
    command: sh -c "npx prisma migrate deploy && node dist/main"
    healthcheck:
      test: ['CMD-SHELL', 'node -e "fetch(''http://127.0.0.1:3010/healthz'').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"']
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- BullMQ Worker 进程 ----
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storyjump-worker
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/storyjump?schema=public
      REDIS_URL: redis://redis:6379
      PUBLIC_BASE_URL: http://127.0.0.1:3010
    volumes:
      - media_data:/app/public
    command: sh -c "npx prisma migrate deploy && node dist/workers/main"

  # ---- 前端 H5 预览服务 ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: storyjump-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5174
      MOCK_API: 'false'
      API_BASE_URL: http://backend:3010
    ports:
      - '5174:5174'
    command: node preview-server.mjs

volumes:
  postgres_data:
  redis_data:
  media_data:

version: '3.9'

services:
  # ---- 数据库 ----
  postgres:
    image: postgres:15
    container_name: storyjump-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: storyjump
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 缓存 & 队列 ----
  redis:
    image: redis:7-alpine
    container_name: storyjump-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- 后端 API 服务 ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storyjump-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:password@postgres:5432/storyjump?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      IMAGE_API_KEY: ${IMAGE_API_KEY}
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-https://api.replicate.com/v1}
      IMAGE_MODEL: ${IMAGE_MODEL:-black-forest-labs/flux-schnell}
      TTS_APP_ID: ${TTS_APP_ID}
      TTS_ACCESS_KEY: ${TTS_ACCESS_KEY}
      TTS_SECRET_KEY: ${TTS_SECRET_KEY}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_BASE_URL: ${COS_BASE_URL}
    ports:
      - '3000:3000'
    command: node dist/main

  # ---- BullMQ Worker 进程 ----
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: storyjump-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:password@postgres:5432/storyjump?schema=public
      REDIS_URL: redis://redis:6379
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_API_BASE_URL: ${DEEPSEEK_API_BASE_URL:-https://api.deepseek.com/v1}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      IMAGE_API_KEY: ${IMAGE_API_KEY}
      IMAGE_API_BASE_URL: ${IMAGE_API_BASE_URL:-https://api.replicate.com/v1}
      IMAGE_MODEL: ${IMAGE_MODEL:-black-forest-labs/flux-schnell}
      TTS_APP_ID: ${TTS_APP_ID}
      TTS_ACCESS_KEY: ${TTS_ACCESS_KEY}
      TTS_SECRET_KEY: ${TTS_SECRET_KEY}
      COS_SECRET_ID: ${COS_SECRET_ID}
      COS_SECRET_KEY: ${COS_SECRET_KEY}
      COS_BUCKET: ${COS_BUCKET}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_BASE_URL: ${COS_BASE_URL}
    command: node dist/workers/main

volumes:
  postgres_data:
  redis_data:
